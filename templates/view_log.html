{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow-sm mb-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 border-bottom pb-3">
        <div>
            <h4 class="text-primary fw-bold mb-1">📜 বিস্তারিত লগ ডিটেইলস</h4>
            <span class="text-muted">প্রজেক্ট: <strong class="text-dark">{{ task.project }}</strong> | স্ট্যাটাস: <strong class="text-success">{{ task.status }}</strong></span>
        </div>
        <a href="/" class="btn btn-secondary mt-3 mt-md-0 shadow-sm fw-bold">🔙 হোম পেজে ফিরুন</a>
    </div>
    
    <div style="background-color: #1e1e1e; color: #00ff00; padding: 20px; border-radius: 8px; height: 500px; overflow-y: scroll; font-family: 'Courier New', monospace; font-size: 14px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8);">
        <pre style="white-space: pre-wrap; word-wrap: break-word;">{{ log_content }}</pre>
    </div>
</div>

<script>
    // পেজ লোড হলে লগের একদম নিচে (স্ক্রল করে) চলে যাবে
    var logBox = document.querySelector('div[style*="overflow-y: scroll"]');
    if(logBox) {
        logBox.scrollTop = logBox.scrollHeight;
    }
</script>
{% endblock %}
